<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hospital Finder Pro</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; background: #ffffff; overflow: hidden; }
        
        #map { height: 45%; width: 100%; z-index: 1; background: #e5e3df; }
        .leaflet-control-attribution, .leaflet-control-zoom { display: none !important; }

        .btn-locate { position: absolute; top: 20px; right: 20px; z-index: 1000; padding: 14px 28px; background: #1a73e8; color: white; border: none; font-weight: bold; cursor: pointer; border-radius: 50px; box-shadow: 0 4px 15px rgba(26, 115, 232, 0.4); font-size: 15px; }

        .container { flex: 1; overflow-y: auto; padding: 15px; z-index: 2; border-top-left-radius: 20px; border-top-right-radius: 20px; margin-top: -20px; background: white; box-shadow: 0 -5px 15px rgba(0,0,0,0.05); }
        .hospital-grid { display: grid; gap: 12px; margin-top: 10px; }
        
        .card { background: #f8f9fa; border-radius: 16px; padding: 18px; border: 1px solid #eee; }
        .card h3 { margin: 0 0 4px 0; font-size: 17px; color: #1a73e8; font-weight: 700; }
        .card p { margin: 0; font-size: 14px; color: #5f6368; }
        .nav-link { text-decoration: none; display: block; margin-top: 12px; font-weight: bold; color: #1a73e8; font-size: 14px; border-top: 1px solid #eee; padding-top: 10px; }
    </style>
</head>
<body>

    <button class="btn-locate" onclick="getLocation()">📍 Find Nearby</button>
    <div id="map"></div>

    <div class="container">
        <div id="hospital-list" class="hospital-grid">
            <p style="text-align:center; color:#999; margin-top:20px;">Tap the button to find hospitals</p>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let map, markersLayer, userMarker, radiusCircle;

        document.addEventListener('DOMContentLoaded', () => {
            map = L.map('map', { zoomControl: false, attributionControl: false }).setView([13.0827, 80.2707], 12);
            markersLayer = L.featureGroup().addTo(map);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        });

        function getLocation() {
            navigator.geolocation.getCurrentPosition(
                (pos) => { startSearch(pos.coords.latitude, pos.coords.longitude); },
                (err) => { alert("Please enable GPS/Location in your settings."); },
                { enableHighAccuracy: true, timeout: 10000 }
            );
        }

        async function startSearch(lat, lon, attempt = 1) {
            const radius = 4000; 
            
            // 1. CLEAR & REDRAW USER LOCATION (The "Safest" Way)
            if(userMarker) map.removeLayer(userMarker);
            if(radiusCircle) map.removeLayer(radiusCircle);
            markersLayer.clearLayers();

            // Native Leaflet CircleMarker (Always visible, blue dot)
            userMarker = L.circleMarker([lat, lon], {
                radius: 9,
                fillColor: "#1a73e8",
                color: "white",
                weight: 3,
                opacity: 1,
                fillOpacity: 0.9
            }).addTo(map).bindPopup("Your Location");

            radiusCircle = L.circle([lat, lon], { 
                radius: radius, 
                color: '#1a73e8', 
                weight: 1, 
                fillOpacity: 0.05 
            }).addTo(map);

            map.flyTo([lat, lon], 14);

            // 2. FETCH DATA
            const query = `[out:json][timeout:15];node["amenity"~"hospital|clinic"](around:${radius},${lat},${lon});out;`;
            const url = `https://overpass-api.de/api/interpreter?data=${encodeURIComponent(query)}`;

            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error("Retry");
                const data = await response.json();
                renderHospitals(data.elements);
            } catch (error) {
                if(attempt < 3) {
                    setTimeout(() => startSearch(lat, lon, attempt + 1), 1000);
                }
            }
        }

        function renderHospitals(hospitals) {
            const listDiv = document.getElementById('hospital-list');
            listDiv.innerHTML = ""; 

            if (hospitals.length === 0) {
                listDiv.innerHTML = "<p style='text-align:center;'>No hospitals found in this 4km radius.</p>";
                return;
            }

            hospitals.forEach(h => {
                const name = h.tags.name || "General Clinic";
                const type = h.tags.amenity.toUpperCase();
                
                const marker = L.marker([h.lat, h.lon]).addTo(markersLayer).bindPopup(`<b>${name}</b>`);

                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div onclick="map.flyTo([${h.lat}, ${h.lon}], 16); marker.openPopup();">
                        <h3>${name}</h3>
                        <p>${type}</p>
                    </div>
                    <a class="nav-link" href="https://www.google.com/maps/dir/?api=1&destination=${h.lat},${h.lon}" target="_blank">↗ Get Directions</a>
                `;
                listDiv.appendChild(card);
            });
        }
    </script>
</body>
</html>
